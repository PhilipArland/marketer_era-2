<!DOCTYPE html>
<html lang="en">

<style>
    .hidden {
        display: none;
    }

    .run-gif img {
        width: 180px;
        height: auto;
    }

    .run-gif {
        position: fixed;
        bottom: 0;
        right: -180px;
        z-index: 9999;

        animation: runAcross 5s linear infinite;
    }

    @keyframes runAcross {
        0% {
            transform: translateX(0);
        }

        100% {
            transform: translateX(-130vw);
        }
    }
</style>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ez Report</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link href="assets/img/4.png" rel="icon">
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <div id="sidebar-container"></div>

    <div class="main-wrap">
        <div id="main-content"></div>
    </div>

    <div id="appAlert" class="app-alert hidden">
        <div class="app-alert-box">
            <div class="app-alert-icon">✔</div>
            <div class="app-alert-msg" id="appAlertMsg">Message</div>

            <button class="app-alert-btn" onclick="closeAppAlert()">OK</button>
        </div>
    </div>
    
    <div id="runGif" class="run-gif hidden">
        <img src="assets/img/run.gif" alt="running">
    </div>

    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
