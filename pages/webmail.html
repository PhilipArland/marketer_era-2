<div class="container-fluid p-2 px-md-3">
    <header class="topbar p-2">
        <div class="topbar-l">
            <button class="hamburger" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="content p-0 pt-3">

        <!-- PROFILE CARD -->
        <div class="card">
            <div class="card-head">
                <div class="card-head-l">
                    <div class="ci s">
                        <i class="bi bi-chat-dots"></i>
                    </div>
                    <span class="card-title">Ez Webmail</span>
                </div>
            </div>

            <div class="card-body">
                <div class="field">
                    <div class="flbl">Company Name</div>
                    <input class="form-control fin" id="set_company" placeholder="Enter Company Name here" />
                </div>

                <div class="field">
                    <div class="flbl">Email Subject</div>
                    <input class="form-control fin" id="set_subject" placeholder="Enter email subject" readonly />
                    <button class="btn bg-success-subtle w-100 mt-2" onclick="copyToClipboard('set_subject')">
                        <i class="bi bi-clipboard"></i> Copy Subject
                    </button>
                </div>

                <div class="field">
                    <div class="flbl">Email Message</div>
                    <textarea class="form-control fin" id="set_message" rows="7"
                        placeholder="Enter email message" readonly></textarea>
                    <button class="btn bg-success-subtle w-100 mt-2" onclick="copyToClipboard('set_message')">
                        <i class="bi bi-clipboard"></i> Copy Message
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>
