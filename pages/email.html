<div class="container-fluid p-2 px-md-3">
    <header class="topbar p-2">
        <div class="topbar-l">
            <button class="hamburger" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="content pt-3">

        <!-- PROFILE CARD -->
        <div class="card">
            <div class="card-head">
                <div class="card-head-l">
                    <div class="ci s">
                        <i class="bi bi-envelope"></i>
                    </div>
                    <span class="card-title">EZ Email</span>
                </div>
            </div>

            <div class="card-body">

                <button class="btn-main w-100 p-5 mb-3" onclick="addEmails()">
                    + Add 50 Emails
                </button>

                <div class="field">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <div class="flbl">Report</div>
                        <div class="buttons">
                            <button class="btn bg-primary-subtle" onclick="undoEmail()"><i class="bi bi-arrow-counterclockwise"></i> Undo</button>
                            <button class="btn btn-danger" onclick="clearReport()"><i class="bi bi-trash"></i> Clear</button>
                        </div>
                    </div>
                    <textarea class="form-control fin" id="email_report" rows="4"></textarea>

                    <button class="btn bg-success-subtle w-100 mt-2" onclick="copyToClipboard('email_report')">
                        <i class="bi bi-clipboard"></i> Copy Report
                    </button>
                </div>
            </div>
        </div>

    </main>
</div>
